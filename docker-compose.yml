services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: writing-app

    working_dir: /var/www

    volumes:
      - ./:/var/www

    ports:
      - "8000:8000"

    depends_on:
      - db

    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: postgres:16

    container_name: writing-db

    environment:
      POSTGRES_DB: laravel_db
      POSTGRES_USER: laravel_user
      POSTGRES_PASSWORD: dbpassword

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: